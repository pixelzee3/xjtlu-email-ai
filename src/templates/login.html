<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - AI 邮件智能助手</title>
    <style>
        :root {
            --accent: #0f8f66;
            --bg: #eef2ef;
            --text: #31413a;
            --border: rgba(15, 23, 42, 0.1);
        }
        * { box-sizing: border-box; }
        body {
            font-family: "Segoe UI", system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .card {
            width: 100%;
            max-width: 400px;
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 28px;
            box-shadow: 0 20px 50px rgba(23, 33, 29, 0.08);
        }
        h1 { font-size: 1.25rem; margin: 0 0 8px; }
        p { margin: 0 0 20px; color: #68766f; font-size: 0.9rem; }
        label { display: block; font-size: 0.82rem; font-weight: 600; margin-bottom: 6px; }
        input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font: inherit;
            margin-bottom: 14px;
        }
        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: var(--accent);
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
        }
        button:hover { filter: brightness(1.05); }
        .err { color: #c04b55; font-size: 0.85rem; margin-top: 8px; min-height: 1.2em; }
        .links { margin-top: 16px; text-align: center; font-size: 0.88rem; }
        .links a { color: var(--accent); }
    </style>
</head>
<body>
    <div class="card">
        <h1>登录</h1>
        <p>使用注册时的邮箱与密码。邮箱为账号唯一标识。</p>
        <form id="loginForm">
            <label for="email">邮箱</label>
            <input type="email" id="email" name="email" required autocomplete="username" placeholder="you@example.com">
            <label for="password">密码</label>
            <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="密码">
            <button type="submit">登录</button>
            <div class="err" id="err"></div>
        </form>
        <div class="links">还没有账号？<a href="/register">注册</a></div>
    </div>
    <script>
        document.getElementById("loginForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const err = document.getElementById("err");
            err.textContent = "";
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;
            const res = await fetch("/api/auth/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                credentials: "same-origin",
                body: JSON.stringify({ email, password }),
            });
            const data = await res.json().catch(() => ({}));
            if (res.ok && data.status === "success") {
                window.location.href = "/";
                return;
            }
            err.textContent = data.message || "登录失败";
        });
    </script>
</body>
</html>
